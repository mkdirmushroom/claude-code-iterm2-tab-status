name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Lint Python
        run: uv run ruff check .

      - name: Check Python formatting
        run: uv run ruff format --check .

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: shellcheck scripts/*.sh tests/*.sh

  test-python:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Run Python tests
        run: uv run --python ${{ matrix.python-version }} pytest tests/test_adapter.py -v

  test-shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python (for JSON validation in shell tests)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run hook tests
        run: bash tests/test_hooks.sh

      - name: Run plugin structure tests
        run: bash tests/test_plugin_structure.sh
